name: core

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: core-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Rust quality (MSRV)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy,rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo check --workspace --all-targets --all-features --locked
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: cargo test --workspace --all-features --locked
      - run: cargo doc --workspace --all-features --no-deps --locked
        env:
          RUSTDOCFLAGS: -D warnings
      - name: Check crate package manifests
        run: |
          for crate in budna-mcp-core budna-mcp-client budna-mcp-server budna-mcp; do
            cmp --silent LICENSE "crates/$crate/LICENSE"
            files="$(cargo package --package "$crate" --list --locked)"
            grep --fixed-strings --line-regexp --quiet LICENSE <<<"$files"
          done
      - run: cargo install cargo-deny --version 0.19.0 --locked
      - run: cargo deny check

  cross-platform:
    name: Check ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - run: cargo check --workspace --all-targets --all-features --locked
