name: core

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: core-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  public-surface:
    name: Public surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - run: python3 scripts/check_public_surface.py

  marketplace-explorer:
    name: Marketplace Explorer UI
    needs: public-surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: ui/marketplace-explorer/package-lock.json
      - run: npm ci
        working-directory: ui/marketplace-explorer
      - run: npm audit --audit-level=high
        working-directory: ui/marketplace-explorer
      - run: npm run check
        working-directory: ui/marketplace-explorer
      - run: npm run build
        working-directory: ui/marketplace-explorer
      - name: Check generated asset drift and size
        run: |
          git diff --exit-code -- crates/budna-mcp-server/assets
          test "$(wc -c < crates/budna-mcp-server/assets/marketplace-explorer-v1.html)" -le 307200
          test -s crates/budna-mcp-server/assets/THIRD_PARTY_NOTICES.txt

  quality:
    name: Rust quality (MSRV)
    needs: [public-surface, marketplace-explorer]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4e529fb27e59237866a6523e61ab248308c068b4 # 1.88.0
        with:
          components: clippy,rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo check --workspace --all-targets --all-features --locked
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: cargo test --workspace --all-features --locked
      - run: cargo doc --workspace --all-features --no-deps --locked
        env:
          RUSTDOCFLAGS: -D warnings
      - name: Check crate package manifests
        run: |
          for crate in budna-mcp-core budna-mcp-client budna-mcp-server budna-mcp; do
            cmp --silent LICENSE "crates/$crate/LICENSE"
            files="$(cargo package --package "$crate" --list --locked)"
            grep --fixed-strings --line-regexp --quiet LICENSE <<<"$files"
            if [[ "$crate" == "budna-mcp-server" ]]; then
              grep --fixed-strings --line-regexp --quiet assets/marketplace-explorer-v1.html <<<"$files"
              grep --fixed-strings --line-regexp --quiet assets/THIRD_PARTY_NOTICES.txt <<<"$files"
            fi
          done
      - run: cargo install cargo-deny --version 0.19.0 --locked
      - run: cargo deny check

  cross-platform:
    name: Check ${{ matrix.os }}
    needs: public-surface
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4e529fb27e59237866a6523e61ab248308c068b4 # 1.88.0
      - run: cargo check --workspace --all-targets --all-features --locked
